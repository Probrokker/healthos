version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: healthos-db
    restart: always
    environment:
      POSTGRES_DB: healthos
      POSTGRES_USER: healthos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthos_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthos"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthos-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://healthos:${POSTGRES_PASSWORD:-healthos_secret_2024}@postgres:5432/healthos
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS:-}
      PORT: 8000
      RUN_MODE: both
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: healthos-dashboard
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://backend:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
